# GitLab CI/CD Configuration for Gull ID

image: ghcr.io/cirruslabs/flutter:stable

stages:
  - test
  - build
  - deploy

# Cache Flutter dependencies for faster builds
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .dart_tool/
    - .packages

# Run tests on all commits
test:
  stage: test
  script:
    - flutter pub get
    - flutter analyze
    - flutter test
  only:
    - branches
    - merge_requests

# Build Android APK
build:android:
  stage: build
  script:
    - flutter pub get
    - flutter build apk --release
  artifacts:
    paths:
      - build/app/outputs/flutter-apk/app-release.apk
    expire_in: 30 days
  only:
    - main
    - tags

