# Build web app
build:web:
  stage: build
  script:
    - flutter pub get
    - flutter build web --release --base-href "/$CI_PROJECT_NAME/"
  artifacts:
    paths:
      - build/web
    expire_in: 30 days
  only:
    - main
    - merge_requests

# Deploy web app to GitLab Pages
pages:
  stage: deploy
  script:
    - flutter pub get
    - flutter build web --release --base-href "/$CI_PROJECT_NAME/"
    - mkdir -p public
    - cp -r build/web/* public/
  artifacts:
    paths:
      - public
  only:
    - main
