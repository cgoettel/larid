# Build web app on merge to main and tags
build:web:
  stage: build
  script:
    - flutter pub get
    - flutter build web --release --base-href "/$CI_PROJECT_NAME/"
  artifacts:
    paths:
      - build/web
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

# Deploy web app to GitLab Pages on merge to main
pages:
  stage: deploy
  needs: [build:web]
  script:
    - mkdir -p public
    - cp -r build/web/* public/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
