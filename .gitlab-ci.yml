# GitLab CI/CD Configuration for Gull ID

image: ghcr.io/cirruslabs/flutter:3.41.7

renovate:
  image: renovate/renovate:43
  variables:
    RENOVATE_PLATFORM: gitlab
    RENOVATE_ENDPOINT: https://gitlab.com/api/v4/
    LOG_LEVEL: info
  script:
    - renovate colby.goettel/larid
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"

stages:
  - test
  - build
  - deploy
  - mirror

# Cache Flutter dependencies for faster builds
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .dart_tool/
    - .packages

# Run tests on MR and feature branches — not on main (already passed before merge)
run_tests:
  stage: test
  script:
    - flutter pub get
    - flutter analyze
    - flutter test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH

# Build Android APK on MRs, merge to main, and tags
build:android:
  stage: build
  script:
    - flutter pub get
    - flutter build apk --release
  artifacts:
    paths:
      - build/app/outputs/flutter-apk/app-release.apk
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

