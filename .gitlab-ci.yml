# Build web app on MRs, merge to main, and tags
build:web:
  stage: build
  script:
    - flutter pub get
    - flutter build web --release --base-href "/$CI_PROJECT_NAME/"
  artifacts:
    paths:
      - build/web
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

# Deploy web app to GitLab Pages on merge to main
pages:
  stage: deploy
  needs: [build:web]
  script:
    - mkdir -p public
    - cp -r build/web/* public/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Mirror main to github.com/cgoettel/larid after a successful main pipeline
mirror_to_github:
  stage: mirror
  image:
    name: alpine/git:latest
    entrypoint: [""]
  variables:
    GIT_STRATEGY: clone
  before_script:
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    # glab strips trailing newline from variable values — re-add it
    - cp "$GITHUB_DEPLOY_KEY" ~/.ssh/id_ed25519
    - printf '\n' >> ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
  script:
    - git remote add github git@github.com:cgoettel/larid.git
    - git push --force github HEAD:refs/heads/main
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == "push"
